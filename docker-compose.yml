x-app-runtime: &app-runtime
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: proxbet-runtime:local

services:
  app:
    <<: *app-runtime
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_PORT: ${APP_PORT:-8080}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DOCKER_DB_NAME:-proxbet}
      DB_USER: ${DOCKER_DB_USER:-proxbet}
      DB_PASS: ${DOCKER_DB_PASS:-change_me_db_password}
      TELEGRAM_BOT_STATE_PATH: /data/telegram_state.json
      SCANNER_STATE_PATH: /data/scanner_state.json
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/data
    entrypoint: ["/usr/local/bin/proxbet/app-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/backend/healthz.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    image: proxbet-runtime:local
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DOCKER_DB_NAME:-proxbet}
      DB_USER: ${DOCKER_DB_USER:-proxbet}
      DB_PASS: ${DOCKER_DB_PASS:-change_me_db_password}
      TELEGRAM_BOT_STATE_PATH: /data/telegram_state.json
      SCANNER_STATE_PATH: /data/scanner_state.json
      PYTHONUNBUFFERED: "1"
      BACK_START_ARGS: ${BACK_START_ARGS:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/data
    entrypoint: ["/usr/local/bin/proxbet/worker-entrypoint.sh"]
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_NAME:-proxbet}
      MYSQL_USER: ${DOCKER_DB_USER:-proxbet}
      MYSQL_PASSWORD: ${DOCKER_DB_PASS:-change_me_db_password}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-change_me_root_password}
    ports:
      - "127.0.0.1:${DOCKER_DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DOCKER_DB_USER:-proxbet}
      PMA_PASSWORD: ${DOCKER_DB_PASS:-change_me_db_password}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-change_me_root_password}
      UPLOAD_LIMIT: 64M
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Redis for caching and state management
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - app
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # Loki for log aggregation
  loki:
    image: grafana/loki:latest
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # Promtail for log shipping
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # Alertmanager for alert routing
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - app
    restart: unless-stopped

  # Node exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  # MySQL exporter for database metrics
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    ports:
      - "127.0.0.1:9104:9104"
    environment:
      - DATA_SOURCE_NAME=${DOCKER_DB_USER:-proxbet}:${DOCKER_DB_PASS:-change_me_db_password}@(db:3306)/
    depends_on:
      - db
    restart: unless-stopped

  # Redis exporter for cache metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - "127.0.0.1:9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  app_data:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
