global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'proxbet'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Proxbet application metrics
  - job_name: 'proxbet-app'
    static_configs:
      - targets: ['app:80']
    metrics_path: '/backend/metrics.php'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL exporter for database metrics
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Redis exporter for cache metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
