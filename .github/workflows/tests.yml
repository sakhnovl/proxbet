name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, curl, json
          coverage: xdebug
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Run Line Tests
        run: cd backend/line/tests && ../../../vendor/bin/phpunit --testdox
      
      - name: Run Core Tests
        run: cd backend/core/tests && ../../../vendor/bin/phpunit --testdox
      
      - name: Run Scanner Tests
        run: cd backend/scanner/tests && ../../../vendor/bin/phpunit --testdox
      
      - name: Run Statistic Tests
        run: cd backend/statistic/tests && ../../../vendor/bin/phpunit --testdox
      
      - name: Generate Coverage Report
        run: |
          cd backend/scanner/tests
          ../../../vendor/bin/phpunit --coverage-clover=coverage.xml
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/scanner/tests/coverage.xml
          flags: unittests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: proxbet_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, curl, json, redis
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Setup test environment
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: test_password
          DB_NAME: proxbet_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          cp .env.example .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASS=test_password" >> .env
          echo "DB_NAME=proxbet_test" >> .env
      
      - name: Run Integration Tests
        run: cd tests/integration && ../../vendor/bin/phpunit --testdox

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Run Composer Audit
        run: composer audit
      
      - name: Check for known vulnerabilities
        uses: symfonycorp/security-checker-action@v5

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Run PHPStan
        run: |
          if [ -f "vendor/bin/phpstan" ]; then
            vendor/bin/phpstan analyse backend --level=5
          fi
      
      - name: Run PHP CS Fixer (dry-run)
        run: |
          if [ -f "vendor/bin/php-cs-fixer" ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff
          fi
